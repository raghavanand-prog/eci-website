<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Voter Registration</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <nav class="navbar">
        <h2>ECI Portal</h2>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About ECI</a></li>
            <li><a href="process.html">Election Process</a></li>
            <li><a href="awareness.html">Voter Awareness</a></li>
            <li><a href="registration.html" class="active">Registration</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="page-header">
        <h1>Voter Registration</h1>
        <p>Register yourself to become an eligible voter.</p>
    </section>

    <section class="registration">

    <div class="registration-container">

        <h2>Voter Registration Form</h2>

        <form id="registrationForm">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Create Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label for="phone">Mobile Number</label>
            <input type="tel" id="phone" placeholder="Enter mobile number" required>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>

            <label>Gender</label>

            <div class="gender">
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </div>

            <label for="state">State</label>

            <select id="state" required>
                <option value="">Select State</option>
               <option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<!-- Union Territories -->
<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
            </select>

            <label for="proof">Upload Identity Proof</label>
            <input type="file" id="proof">

            <label for="address">Address</label>
            <textarea id="address" placeholder="Enter your address"></textarea>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    I agree to the Election Commission Terms & Conditions
                </label>
            </div>

            <button type="submit" class="btn">
                Register
            </button>

        </form>
        <div id="successMessage"></div>
        <div id="resultCard"></div>

    </div>

    </section>

    <footer>
        <p>© 2026 Election Commission of India Portal</p>
    </footer>
    

</body>

</html>
